# Alembic configuration file
# Intelligent Academic Advisor — MVP
# Database Engineer — 2026-03-27
#
# NOTE: This file is checked into source control. DATABASE_URL must be set
# as an environment variable — it is NOT hardcoded here. The env.py file
# reads it from os.environ["DATABASE_URL"] and passes it to Alembic at
# runtime.

[alembic]
# Path to the migration scripts directory, relative to this file's location.
script_location = %(here)s

# Template for naming new migration files.
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d%(second).2d is
# replaced by: file_template = %%(rev)s_%%(slug)s
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps.
timezone = UTC

# Maximum length of the slug portion of the filename.
truncate_slug_length = 40

# Prepend sys.path entry for importing application modules.
# The project root (containing the `database/` package) must be on PYTHONPATH.
prepend_sys_path = .

# Do not call configure() on the connection in env.py — handled manually.
# (This is the default; listed here for clarity.)

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
