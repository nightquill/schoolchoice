server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so browsers always fetch the latest build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # JS/CSS assets have hashed filenames — safe to cache indefinitely
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
