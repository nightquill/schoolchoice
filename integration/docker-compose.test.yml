version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: advisor_db
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpassword}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor -d advisor_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No volumes — ephemeral postgres for test runs

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://advisor:${POSTGRES_PASSWORD:-testpassword}@postgres:5432/advisor_db
      SECRET_KEY: ${SECRET_KEY:-test-secret-key-not-for-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
